<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Elliott the Hippo</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        height: -webkit-fill-available;
        overflow: hidden;
        overscroll-behavior: none;
        background: #3a7bbf;
        font-family: system-ui, sans-serif;
        color: #fff;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      h1 {
        font-size: clamp(36px, 8vw, 64px);
        font-weight: 900;
        letter-spacing: -1px;
        text-shadow: 0 3px 8px rgba(0,0,0,0.4);
        text-align: center;
      }

      #start-hippo {
        width: min(40vw, 200px);
        height: min(40vw, 200px);
        filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
        animation: hippo-bob 2.4s ease-in-out infinite;
        flex-shrink: 0;
      }

      #start-hippo svg {
        width: 100%;
        height: 100%;
      }

      @keyframes hippo-bob {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-12px); }
      }

      #play-btn {
        display: block;
        padding: 18px 56px;
        font-size: 24px;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        background: #f5c842;
        color: #3a2a00;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 4px 0 #b8912a, 0 6px 16px rgba(0,0,0,0.3);
        transition: transform 0.08s, box-shadow 0.08s;
        touch-action: manipulation;
      }

      #play-btn:active {
        transform: translateY(3px);
        box-shadow: 0 1px 0 #b8912a, 0 2px 8px rgba(0,0,0,0.25);
      }
    </style>
  </head>
  <body>
    <h1>Elliott the Hippo</h1>
    <div id="start-hippo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 2.5 100 102" style="display:block;width:100%;height:100%">
        <defs>
          <radialGradient id="blush">
            <stop offset="0%"   stop-color="#FF9EB5" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#FF9EB5" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect x="44" y="91" width="8" height="12" rx="4" ry="4" fill="#6D91C8" stroke="#4A6FA5" stroke-width="3" />
        <rect x="16" y="36" width="68" height="61" rx="16" ry="16" fill="#6D91C8" stroke="#4A6FA5" stroke-width="3" />
        <ellipse cx="28" cy="42" rx="7" ry="9" transform="rotate(15,28,42)" fill="#7B9FD4" stroke="#4A6FA5" stroke-width="3" />
        <ellipse cx="72" cy="42" rx="7" ry="9" transform="rotate(-15,72,42)" fill="#7B9FD4" stroke="#4A6FA5" stroke-width="3" />
        <rect x="26" y="4" width="48" height="38" rx="10" ry="10" fill="#7B9FD4" stroke="#4A6FA5" stroke-width="3" />
        <ellipse cx="28" cy="42" rx="5.5" ry="7.5" transform="rotate(15,28,42)" fill="#7B9FD4" />
        <ellipse cx="72" cy="42" rx="5.5" ry="7.5" transform="rotate(-15,72,42)" fill="#7B9FD4" />
        <ellipse cx="28" cy="42" rx="3.5" ry="5" transform="rotate(15,28,42)" fill="#9BB8D8" />
        <ellipse cx="72" cy="42" rx="3.5" ry="5" transform="rotate(-15,72,42)" fill="#9BB8D8" />
        <ellipse cx="34" cy="22" rx="11" ry="11" fill="url(#blush)" />
        <ellipse cx="66" cy="22" rx="11" ry="11" fill="url(#blush)" />
        <ellipse cx="40" cy="14" rx="5" ry="3.5" fill="#5A7EB5" />
        <ellipse cx="60" cy="14" rx="5" ry="3.5" fill="#5A7EB5" />
        <path d="M 33,27 A 7,7 0 0,0 47,27" fill="none" stroke="#3A5888" stroke-width="2.5" stroke-linecap="round" />
        <path d="M 53,27 A 7,7 0 0,0 67,27" fill="none" stroke="#3A5888" stroke-width="2.5" stroke-linecap="round" />
      </svg>
    </div>
    <a id="play-btn" href="./game.html">Start</a>
  </body>
</html>
